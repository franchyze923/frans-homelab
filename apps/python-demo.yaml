apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-demo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/franchyze923/app-of-apps.git
    targetRevision: main
    path: workloads/python-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: python-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
