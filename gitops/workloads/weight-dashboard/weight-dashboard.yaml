apiVersion: v1
kind: Namespace
metadata:
  name: weight-dashboard
---
# Persistent OAuth token store. The app reads/rewrites TOKEN_FILE in place as it
# refreshes the Withings token, so it must be writable + persistent. Ceph RBD
# (no NFS stale-handle risk). Seeded once from the Docker box's tokens.json.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: weight-dashboard-tokens
  namespace: weight-dashboard
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weight-dashboard
  namespace: weight-dashboard
  labels:
    app: weight-dashboard
spec:
  replicas: 1
  # Recreate: token PVC is ReadWriteOnce. Also avoids two instances ever
  # refreshing the same (rotating) Withings refresh token at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: weight-dashboard
  template:
    metadata:
      labels:
        app: weight-dashboard
    spec:
      containers:
        - name: weight-dashboard
          image: franchyze923/weight-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          env:
            # Withings OAuth app credentials (out-of-band Secret, gitignored).
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: withings-api-creds
                  key: CLIENT_ID
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: withings-api-creds
                  key: CLIENT_SECRET
            - name: TOKEN_FILE
              value: /data/tokens.json
            - name: REFRESH_SKEW_SECONDS
              value: "90"
          volumeMounts:
            - name: tokens
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: tokens
          persistentVolumeClaim:
            claimName: weight-dashboard-tokens
---
apiVersion: v1
kind: Service
metadata:
  name: weight-dashboard
  namespace: weight-dashboard
  labels:
    app: weight-dashboard
  annotations:
    # Share the platform LoadBalancer IP (192.168.40.201) -- reachable at
    # 192.168.40.201:5000. Still ClusterIP-backed for the gateway HTTPRoute
    # and the in-cluster weight-exporter.
    lbipam.cilium.io/sharing-key: "platform"
    lbipam.cilium.io/sharing-cross-namespace: "*"
spec:
  type: LoadBalancer
  selector:
    app: weight-dashboard
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: weight-dashboard
  namespace: weight-dashboard
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-system
  hostnames:
    - weight-dashboard.franpolignano.com
  rules:
    - backendRefs:
        - name: weight-dashboard
          port: 5000
---
# Hourly ping so the OAuth token keeps getting refreshed even if nobody visits
# (token refresh happens on request). Prometheus' weight-exporter also scrapes
# /api/weights every 30m, but this is belt-and-suspenders.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ping-weight-dashboard
  namespace: weight-dashboard
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: curl
              image: curlimages/curl:latest
              args:
                - -fsS
                - -o
                - /dev/null
                - http://weight-dashboard.weight-dashboard.svc.cluster.local:5000/api/weights
