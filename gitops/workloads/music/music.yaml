apiVersion: v1
kind: Namespace
metadata:
  name: music
---
# Shared music library on Unraid NFS — spotdl writes, navidrome reads.
# Everything here is re-downloadable, so no backup CronJob for this volume.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: music-library-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranMedia/Music/spotdl
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: music-library
  namespace: music
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: music-library-pv
  resources:
    requests:
      storage: 1Ti
---
# Pre-existing ripped album library (managed by lidarr, ns lidarr).
# Read-only here; add it in the Navidrome admin UI as a second library
# pointing at /music-full-albums. NOTE: the NFS path has a literal space.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: full-albums-library-pv
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: "/mnt/user/FranData/FranMedia/Music/Full Albums"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: full-albums-library
  namespace: music
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: full-albums-library-pv
  resources:
    requests:
      storage: 10Ti
---
# Navidrome state (SQLite DB, cache) on Ceph RBD for reliability
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-data
  namespace: music
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 2Gi
---
# NFS volume for navidrome data backups (survives cluster rebuilds)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: navidrome-data-backup-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranArchives/k8s-pvs/navidrome
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-data-backup
  namespace: music
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: navidrome-data-backup-pv
  resources:
    requests:
      storage: 2Gi
---
# Spotify playlists to mirror — one public playlist/album/artist URL per line.
# spotdl fetches metadata from the Spotify API and audio from YouTube Music.
apiVersion: v1
kind: ConfigMap
metadata:
  name: spotdl-playlists
  namespace: music
data:
  playlists.txt: |
    # Add public Spotify playlist/album URLs below, one per line.
    # NOTE: Spotify-generated playlists (IDs starting 37i9dQZF — Daily Mix,
    # On Repeat, editorial) are blocked for third-party apps since late 2024
    # and WILL fail. Workaround: copy their tracks into a playlist you own,
    # make it public, and list that URL instead. See README.
    # https://open.spotify.com/playlist/37i9dQZF1F5p3rmiWPIYgZ  <- fails (Spotify-owned)
    https://open.spotify.com/playlist/0XD7SpoX9Oa7DbVXBVHcQV?si=6ba0f7aef944462f
    https://open.spotify.com/playlist/5cyZBBm6FxatNkGODlnpOL?si=df7f95a4648a48c8
    https://open.spotify.com/playlist/2Ozg9Jjb7BVfOxtzL4NXrc?si=46ca735659194b2a
  # After each sync, mirror the m3u8 playlists into Plex ("Fran's Music"
  # includes /media/Music/spotdl; the job sees the same files at /music).
  # Tracks are resolved to library ratingKeys and the playlist is built via
  # the playlists API — /playlists/upload returns 200 but silently creates
  # nothing on PMS 1.43. Needs Secret plex-token (key `token`, out-of-band);
  # skips quietly if absent.
  plex_import.py: |
    import glob, os, sys, time, urllib.parse, urllib.request
    import xml.etree.ElementTree as ET

    PLEX = os.environ.get("PLEX_URL", "http://plex.plex.svc.cluster.local:32400")
    TOKEN = os.environ.get("PLEX_TOKEN", "")
    SECTION = os.environ.get("PLEX_SECTION", "5")
    JOB_PREFIX, PLEX_PREFIX = "/music/", "/media/Music/spotdl/"

    if not TOKEN:
        print("PLEX_TOKEN not set; skipping Plex playlist import")
        sys.exit(0)

    def api(path, method="GET"):
        sep = "&" if "?" in path else "?"
        req = urllib.request.Request(PLEX + path + sep + "X-Plex-Token=" + TOKEN, method=method)
        with urllib.request.urlopen(req, timeout=60) as r:
            return r.read()

    lists = glob.glob("/music/playlists/*.m3u8")
    if not lists:
        print("no m3u8 playlists found; nothing to import")
        sys.exit(0)

    # scan the section first so freshly downloaded files are matchable
    api("/library/sections/%s/refresh" % SECTION)
    for _ in range(90):
        time.sleep(10)
        d = next((d for d in ET.fromstring(api("/library/sections")).iter("Directory")
                  if d.get("key") == SECTION), None)
        if d is None or d.get("refreshing") != "1":
            break

    machine = ET.fromstring(api("/identity")).get("machineIdentifier")
    tracks = {}  # file path (Plex's view) -> ratingKey
    for t in ET.fromstring(api("/library/sections/%s/all?type=10" % SECTION)).iter("Track"):
        for part in t.iter("Part"):
            tracks[part.get("file")] = t.get("ratingKey")

    def uri(ids):
        return urllib.parse.quote(
            "server://%s/com.plexapp.plugins.library/library/metadata/%s"
            % (machine, ",".join(ids)), safe="")

    rc = 0
    existing = ET.fromstring(api("/playlists"))
    for src in lists:
        name = os.path.splitext(os.path.basename(src))[0]
        wanted, missing = [], 0
        for line in open(src):
            line = line.strip()
            if not line or line.startswith("#"):
                continue
            rk = tracks.get(PLEX_PREFIX + line[len(JOB_PREFIX):] if line.startswith(JOB_PREFIX) else line)
            if rk:
                wanted.append(rk)
            else:
                missing += 1
        if not wanted:
            print("no matchable tracks for '%s'; skipping" % name)
            continue
        try:
            for p in existing.iter("Playlist"):
                if p.get("title") == name:
                    api("/playlists/" + p.get("ratingKey"), method="DELETE")
            first, rest = wanted[:200], wanted[200:]
            resp = ET.fromstring(api("/playlists?type=audio&smart=0&title=%s&uri=%s"
                                     % (urllib.parse.quote(name), uri(first)), method="POST"))
            key = next(p.get("ratingKey") for p in resp.iter("Playlist"))
            while rest:
                chunk, rest = rest[:200], rest[200:]
                api("/playlists/%s/items?uri=%s" % (key, uri(chunk)), method="PUT")
            print("plex playlist '%s': %d tracks (%d unmatched)" % (name, len(wanted), missing))
        except Exception as e:
            print("PLEX IMPORT FAILED for %s: %s" % (name, e))
            rc = 1
    sys.exit(rc)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace: music
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: navidrome
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      initContainers:
        - name: restore-data
          image: busybox:latest
          command: ['sh', '-c', 'if [ -z "$(find /data -mindepth 1 -not -name lost+found 2>/dev/null)" ]; then if [ -f /data-backup/backup.tar.gz ]; then echo "Restoring from tarball..."; tar xzf /data-backup/backup.tar.gz -C /data; else echo "No backup found, skipping."; fi; else echo "Already populated, skipping restore."; fi']
          volumeMounts:
            - name: data
              mountPath: /data
            - name: data-backup
              mountPath: /data-backup
              readOnly: true
      containers:
        - name: navidrome
          image: deluan/navidrome:0.63.1
          ports:
            - containerPort: 4533
          env:
            - name: ND_MUSICFOLDER
              value: /music
            - name: ND_DATAFOLDER
              value: /data
            - name: ND_SCANSCHEDULE
              value: 1h
          volumeMounts:
            - name: data
              mountPath: /data
            - name: music
              mountPath: /music
              readOnly: true
            - name: full-albums
              mountPath: /music-full-albums
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: navidrome-data
        - name: data-backup
          persistentVolumeClaim:
            claimName: navidrome-data-backup
        - name: music
          persistentVolumeClaim:
            claimName: music-library
        - name: full-albums
          persistentVolumeClaim:
            claimName: full-albums-library
---
apiVersion: v1
kind: Service
metadata:
  name: navidrome
  namespace: music
spec:
  type: ClusterIP
  selector:
    app: navidrome
  ports:
    - port: 4533
      targetPort: 4533
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: navidrome
  namespace: music
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-system
  hostnames:
    - navidrome.franpolignano.com
  rules:
    - backendRefs:
        - name: navidrome
          port: 4533
---
# Nightly spotdl sync of the playlists in the ConfigMap. Layout is
# /music/{artist}/{album}/, plus an .m3u8 per playlist in /music/playlists
# (navidrome imports those automatically). Sync state in /music/.spotdl.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: spotdl-sync
  namespace: music
spec:
  schedule: "30 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # a wedged NFS mount + Forbid must not silently block future runs
      activeDeadlineSeconds: 21600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: spotdl
              # custom image: official one is musl-based and crashes in
              # tls_client — see Dockerfile in this directory
              image: franchyze923/spotdl:4.5.0
              command:
                - sh
                - -c
                - |
                  set -u
                  mkdir -p /music/.spotdl /music/playlists
                  rc=0
                  for url in $(grep -Ev '^\s*(#|$)' /config/playlists.txt); do
                    id=$(printf '%s' "$url" | md5sum | cut -c1-12)
                    echo "=== syncing $url"
                    spotdl sync "$url" \
                      --save-file "/music/.spotdl/$id.spotdl" \
                      --output "/music/{artist}/{album}/{title}.{output-ext}" \
                      --m3u "/music/playlists/{list}.m3u8" || { echo "SYNC FAILED: $url"; rc=1; }
                  done
                  echo "spotdl sync finished at $(date)"
                  python3 /config/plex_import.py || rc=1
                  exit $rc
              env:
                - name: PLEX_SECTION
                  value: "5"
                - name: PLEX_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: plex-token
                      key: token
                      optional: true
              volumeMounts:
                - name: music
                  mountPath: /music
                - name: playlists
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "200m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
          volumes:
            - name: music
              persistentVolumeClaim:
                claimName: music-library
            - name: playlists
              configMap:
                name: spotdl-playlists
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: navidrome-data-backup
  namespace: music
spec:
  schedule: "45 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          # navidrome-data is RWO RBD — backup must co-locate with navidrome
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: navidrome
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: backup
              image: debian:stable-slim
              command: ['sh', '-c', 'echo "Starting navidrome data backup..."; tar czf /data-backup/backup.tar.gz -C /data . 2>/tmp/e; rc=$?; tail -5 /tmp/e; if [ $rc -gt 1 ]; then echo "BACKUP FAILED (tar rc=$rc)"; exit $rc; fi; echo "Backup complete at $(date)"']
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: data-backup
                  mountPath: /data-backup
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: navidrome-data
            - name: data-backup
              persistentVolumeClaim:
                claimName: navidrome-data-backup
