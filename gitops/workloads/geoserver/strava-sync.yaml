# Daily Strava -> PostGIS sync. Pulls new activities via the Strava API and
# inserts them into strava_activities (published as strava:strava_activities).
#
# Auth state (rotating refresh token -- Strava rotates like Withings does)
# lives in the strava_auth table, so it's covered by the nightly pg_dump and
# survives rebuilds. One-time setup: run strava-auth.sh to create the
# strava-api Secret (client id/secret + first refresh token). See README.
#
# No custom image: psql reads state -> stdlib-only python talks to the API
# and emits SQL -> psql applies it. Backfill is capped per run (rate limits);
# it catches up across daily runs, or run it by hand:
#   kubectl -n geoserver create job --from=cronjob/strava-sync strava-sync-now
apiVersion: v1
kind: ConfigMap
metadata:
  name: strava-sync-script
  namespace: geoserver
data:
  strava_sync.py: |
    import json, os, sys, urllib.request, urllib.parse, urllib.error

    API = "https://www.strava.com/api/v3"
    MAX_DETAIL = int(os.environ.get("MAX_ACTIVITIES_PER_RUN", "100"))

    def http(url, form=None):
        req = urllib.request.Request(url)
        if form is not None:
            req.data = urllib.parse.urlencode(form).encode()
        if TOKEN:
            req.add_header("Authorization", "Bearer " + TOKEN)
        try:
            with urllib.request.urlopen(req, timeout=60) as r:
                return r.status, json.load(r)
        except urllib.error.HTTPError as e:
            return e.code, {}

    def esc(s):
        return "NULL" if s is None else "'" + str(s).replace("'", "''") + "'"

    def decode_polyline(s):
        pts, lat, lng, i = [], 0, 0, 0
        while i < len(s):
            for which in (0, 1):
                shift = result = 0
                while True:
                    b = ord(s[i]) - 63; i += 1
                    result |= (b & 0x1F) << shift
                    shift += 5
                    if b < 0x20:
                        break
                d = ~(result >> 1) if result & 1 else result >> 1
                if which == 0: lat += d
                else: lng += d
            pts.append((lng / 1e5, lat / 1e5))
        return pts

    def wkt(pts):
        if len(pts) < 2:
            return "NULL"
        body = ",".join(f"{x:.6f} {y:.6f}" for x, y in pts)
        return f"ST_GeomFromText('LINESTRING({body})',4326)"

    # --- refresh the access token (always persist the newest refresh token)
    TOKEN = None
    refresh = open("/shared/refresh_token").read().strip() \
        or os.environ.get("INITIAL_REFRESH_TOKEN", "")
    if not refresh:
        sys.exit("no refresh token: seed the strava-api secret (strava-auth.sh)")
    st, tok = http("https://www.strava.com/oauth/token", {
        "client_id": os.environ["CLIENT_ID"],
        "client_secret": os.environ["CLIENT_SECRET"],
        "grant_type": "refresh_token",
        "refresh_token": refresh})
    if st != 200:
        sys.exit(f"token refresh failed: HTTP {st}")
    TOKEN = tok["access_token"]

    sql = ["BEGIN;",
           "INSERT INTO strava_auth(id, refresh_token, updated_at) "
           f"VALUES (1, {esc(tok['refresh_token'])}, now()) "
           "ON CONFLICT (id) DO UPDATE SET refresh_token = EXCLUDED.refresh_token,"
           " updated_at = now();"]

    # --- list activities newer than what's already in the table
    after = open("/shared/after").read().strip() or "0"
    acts, page = [], 1
    while len(acts) < MAX_DETAIL:
        st, batch = http(f"{API}/athlete/activities?after={after}&per_page=200&page={page}")
        if st == 429:
            print("rate limited while listing; syncing what we have")
            break
        if st != 200:
            sys.exit(f"activity list failed: HTTP {st}")
        if not batch:
            break
        acts += batch
        page += 1
    acts = acts[:MAX_DETAIL]

    # --- full-resolution track per activity; fall back to summary polyline
    loaded = 0
    for a in acts:
        st, streams = http(f"{API}/activities/{a['id']}/streams?keys=latlng&key_by_type=true")
        if st == 429:
            print(f"rate limited after {loaded} activities; rest sync tomorrow")
            break
        if st == 200 and "latlng" in streams:
            pts = [(lng, lat) for lat, lng in streams["latlng"]["data"]]
        else:  # no GPS (trainer/manual) -> keep the row, maybe summary line
            pts = decode_polyline((a.get("map") or {}).get("summary_polyline") or "")
        sql.append(
            "INSERT INTO strava_activities(id, name, sport_type, start_date,"
            " distance_m, moving_time_s, elapsed_time_s, elev_gain_m, geom) VALUES ("
            f"{a['id']}, {esc(a.get('name'))}, {esc(a.get('sport_type'))},"
            f" {esc(a.get('start_date'))}, {a.get('distance') or 'NULL'},"
            f" {a.get('moving_time') or 'NULL'}, {a.get('elapsed_time') or 'NULL'},"
            f" {a.get('total_elevation_gain') or 'NULL'}, {wkt(pts)})"
            " ON CONFLICT (id) DO NOTHING;")
        loaded += 1

    sql.append("COMMIT;")
    with open("/shared/apply.sql", "w") as f:
        f.write("\n".join(sql) + "\n")
    print(f"prepared {loaded} activities (after={after})")
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: strava-sync
  namespace: geoserver
spec:
  schedule: "0 16 * * *"
  timeZone: America/New_York
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Don't let a stuck pod (missing secret, dead mount) block future runs
      activeDeadlineSeconds: 3600
      template:
        spec:
          restartPolicy: Never
          initContainers:
            - name: read-state
              image: postgis/postgis:17-3.5
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgis-credentials
                      key: POSTGRES_PASSWORD
              command: ['sh', '-c', "psql -h postgis -U gis -d gis -tAc \"SELECT COALESCE((SELECT refresh_token FROM strava_auth WHERE id=1),'')\" > /shared/refresh_token && psql -h postgis -U gis -d gis -tAc \"SELECT COALESCE(EXTRACT(EPOCH FROM max(start_date))::bigint,0) FROM strava_activities\" > /shared/after && echo \"state: after=$(cat /shared/after)\""]
              volumeMounts:
                - name: shared
                  mountPath: /shared
            - name: fetch
              image: python:3.12-slim
              command: ['python3', '/scripts/strava_sync.py']
              env:
                - name: CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: strava-api
                      key: CLIENT_ID
                - name: CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: strava-api
                      key: CLIENT_SECRET
                - name: INITIAL_REFRESH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: strava-api
                      key: INITIAL_REFRESH_TOKEN
              volumeMounts:
                - name: shared
                  mountPath: /shared
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          containers:
            - name: apply
              image: postgis/postgis:17-3.5
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgis-credentials
                      key: POSTGRES_PASSWORD
              command: ['sh', '-c', 'psql -h postgis -U gis -d gis -v ON_ERROR_STOP=1 -q -f /shared/apply.sql && psql -h postgis -U gis -d gis -tAc "SELECT count(*) || '' activities total, newest: '' || COALESCE(max(start_date)::text, ''none'') FROM strava_activities"']
              volumeMounts:
                - name: shared
                  mountPath: /shared
          volumes:
            - name: shared
              emptyDir: {}
            - name: scripts
              configMap:
                name: strava-sync-script
