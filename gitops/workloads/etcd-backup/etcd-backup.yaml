apiVersion: v1
kind: Namespace
metadata:
  name: etcd-backup
---
# NFS volume for etcd snapshots (survives cluster rebuilds -- that's the point)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: etcd-snapshots-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranArchives/k8s-pvs/etcd-snapshots
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: etcd-snapshots
  namespace: etcd-backup
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: etcd-snapshots-pv
  resources:
    requests:
      storage: 5Gi
---
# Nightly etcd snapshot to the NAS. Runs on a control-plane node with
# hostNetwork so etcdctl can reach the local etcd member on 127.0.0.1:2379,
# authenticating with the kubeadm healthcheck-client cert from the host.
# Works before and after the HA conversion: any member's snapshot is a full
# copy of the keyspace.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-snapshot
  namespace: etcd-backup
spec:
  schedule: "15 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          hostNetwork: true
          nodeSelector:
            node-role.kubernetes.io/control-plane: ""
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          initContainers:
            # Same image version as the cluster's etcd static pods.
            - name: snapshot
              image: registry.k8s.io/etcd:3.6.6-0
              command:
                - /usr/local/bin/etcdctl
                - --endpoints=https://127.0.0.1:2379
                - --cacert=/etc/kubernetes/pki/etcd/ca.crt
                - --cert=/etc/kubernetes/pki/etcd/healthcheck-client.crt
                - --key=/etc/kubernetes/pki/etcd/healthcheck-client.key
                - snapshot
                - save
                - /backup/etcd-snapshot.db.tmp
              volumeMounts:
                - name: etcd-certs
                  mountPath: /etc/kubernetes/pki/etcd
                  readOnly: true
                - name: snapshots
                  mountPath: /backup
          containers:
            # Date-stamp the snapshot and keep the newest 14.
            - name: finalize
              image: debian:stable-slim
              command:
                - sh
                - -c
                - >
                  set -e;
                  f=/backup/etcd-snapshot-$(date +%F).db;
                  mv /backup/etcd-snapshot.db.tmp "$f";
                  echo "snapshot: $f ($(du -h "$f" | cut -f1))";
                  ls -1t /backup/etcd-snapshot-*.db | tail -n +15 | xargs -r rm -v;
                  echo "retained: $(ls -1 /backup/etcd-snapshot-*.db | wc -l) snapshots"
              volumeMounts:
                - name: snapshots
                  mountPath: /backup
          volumes:
            - name: etcd-certs
              hostPath:
                path: /etc/kubernetes/pki/etcd
                type: Directory
            - name: snapshots
              persistentVolumeClaim:
                claimName: etcd-snapshots
