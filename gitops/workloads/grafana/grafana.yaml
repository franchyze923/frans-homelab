---
# Grafana Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
      initContainers:
        - name: restore-config
          image: busybox:latest
          command: ['sh', '-c', 'if [ -z "$(find /storage -mindepth 1 -not -name lost+found 2>/dev/null)" ]; then if [ -f /storage-backup/backup.tar.gz ]; then echo "Restoring from tarball..."; tar xzf /storage-backup/backup.tar.gz -C /storage; chown -R 472:472 /storage; elif [ -n "$(ls -A /storage-backup/ 2>/dev/null)" ]; then echo "Restoring from legacy backup..."; cp -r /storage-backup/. /storage/; chown -R 472:472 /storage; else echo "No backup found, skipping."; fi; else echo "Already populated, skipping restore."; fi']
          volumeMounts:
            - name: storage
              mountPath: /storage
            - name: storage-backup
              mountPath: /storage-backup
              readOnly: true
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            # --- Keycloak SSO (client secret from out-of-band Secret) ---
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.franpolignano.com"
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: "Keycloak"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              value: "grafana"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-oidc
                  key: CLIENT_SECRET
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: "openid profile email"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: "https://keycloak.franpolignano.com/realms/homelab/protocol/openid-connect/auth"
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: "https://keycloak.franpolignano.com/realms/homelab/protocol/openid-connect/token"
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: "https://keycloak.franpolignano.com/realms/homelab/protocol/openid-connect/userinfo"
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
              value: "true"
            # fran is Admin, anyone else in the realm is Viewer
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: "email=='franpolignano@gmail.com' && 'Admin' || 'Viewer'"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: storage
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              # Was 256Mi and sitting at ~78%; Grafana spikes when rendering.
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: storage
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: storage-backup
          persistentVolumeClaim:
            claimName: grafana-storage-backup
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-system
  hostnames:
    - grafana.franpolignano.com
  rules:
    - backendRefs:
        - name: grafana
          port: 3000
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: grafana-storage-backup
  namespace: monitoring
spec:
  schedule: "55 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: grafana
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: backup
              image: debian:stable-slim
              command: ['sh', '-c', 'echo "Starting grafana storage backup..."; tar czf /storage-backup/backup.tar.gz -C /storage . 2>/tmp/e; rc=$?; tail -5 /tmp/e; if [ $rc -gt 1 ]; then echo "BACKUP FAILED (tar rc=$rc)"; exit $rc; fi; echo "Backup complete at $(date)"; echo "--> backed up to: $(grep backup /proc/mounts | head -1 | sed "s/ .*//")/backup.tar.gz"']
              volumeMounts:
                - name: storage
                  mountPath: /storage
                  readOnly: true
                - name: storage-backup
                  mountPath: /storage-backup
          volumes:
            - name: storage
              persistentVolumeClaim:
                claimName: grafana-pvc
            - name: storage-backup
              persistentVolumeClaim:
                claimName: grafana-storage-backup
