# Exposes the Tesla P4's live utilization/VRAM/temp/power as Prometheus
# metrics (shells out to nvidia-smi). Requests one nvidia.com/gpu
# time-slice like any other consumer -- see nvidia-device-plugin's
# replicas bump (4 -> 5) for why that doesn't displace a real workload.
apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-gpu-exporter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvidia-gpu-exporter
  namespace: nvidia-gpu-exporter
  labels:
    app: nvidia-gpu-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nvidia-gpu-exporter
  template:
    metadata:
      labels:
        app: nvidia-gpu-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9835"
    spec:
      nodeSelector:
        gpu: "true"
      containers:
        - name: nvidia-gpu-exporter
          image: utkuozdemir/nvidia_gpu_exporter:1.3.1
          ports:
            - containerPort: 9835
              name: metrics
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
              nvidia.com/gpu: 1
---
# Per-process GPU memory (nvidia-smi --query-compute-apps): the go-based
# exporter above only covers device-level stats, not the process table.
# Separate container/Deployment because device-plugin resources are
# requested per-container -- needs its own nvidia.com/gpu slice (see
# nvidia-device-plugin's replicas bump 5 -> 6).
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvidia-gpu-process-exporter-script
  namespace: nvidia-gpu-exporter
data:
  exporter.py: |
    import subprocess
    import http.server

    def get_metrics():
        try:
            out = subprocess.check_output(
                ["nvidia-smi", "--query-compute-apps=pid,process_name,used_memory",
                 "--format=csv,noheader,nounits"],
                text=True, timeout=5)
        except Exception:
            return "# nvidia-smi query failed\n"
        lines = [
            "# HELP nvidia_smi_process_memory_used_bytes GPU memory used by process (nvidia-smi --query-compute-apps)",
            "# TYPE nvidia_smi_process_memory_used_bytes gauge",
        ]
        count = 0
        for line in out.strip().splitlines():
            parts = [p.strip() for p in line.split(",")]
            if len(parts) != 3:
                continue
            pid, name, mem = parts
            try:
                mem_bytes = int(float(mem)) * 1024 * 1024
            except ValueError:
                continue
            name_esc = name.replace("\\", "\\\\").replace('"', '\\"')
            lines.append(f'nvidia_smi_process_memory_used_bytes{{pid="{pid}",process_name="{name_esc}"}} {mem_bytes}')
            count += 1
        lines.append("# HELP nvidia_smi_process_count Number of processes currently using the GPU")
        lines.append("# TYPE nvidia_smi_process_count gauge")
        lines.append(f"nvidia_smi_process_count {count}")
        return "\n".join(lines) + "\n"

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path != "/metrics":
                self.send_response(404)
                self.end_headers()
                return
            body = get_metrics().encode()
            self.send_response(200)
            self.send_header("Content-Type", "text/plain; version=0.0.4")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, *args):
            pass

    if __name__ == "__main__":
        http.server.HTTPServer(("0.0.0.0", 9836), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvidia-gpu-process-exporter
  namespace: nvidia-gpu-exporter
  labels:
    app: nvidia-gpu-process-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nvidia-gpu-process-exporter
  template:
    metadata:
      labels:
        app: nvidia-gpu-process-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9836"
    spec:
      nodeSelector:
        gpu: "true"
      # nvidia-smi's PID column is a host PID, but process_name resolution
      # reads /proc/<pid>/comm -- without hostPID this container only sees
      # its own PID namespace and every process shows "[Not Found]".
      hostPID: true
      containers:
        - name: nvidia-gpu-process-exporter
          image: python:3.12-slim
          command: ["python3", "/app/exporter.py"]
          ports:
            - containerPort: 9836
              name: metrics
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
              nvidia.com/gpu: 1
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: nvidia-gpu-process-exporter-script
