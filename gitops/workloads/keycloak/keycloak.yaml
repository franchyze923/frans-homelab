apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
---
# Data on Ceph RBD for reliability (no stale NFS handles)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-data
  namespace: keycloak
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 2Gi
---
# NFS volume for data backups (survives cluster rebuilds)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: keycloak-data-backup-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranArchives/k8s-pvs/keycloak
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-data-backup
  namespace: keycloak
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: keycloak-data-backup-pv
  resources:
    requests:
      storage: 1Gi
---
# Admin credentials live in Secret `keycloak-admin-creds`, applied
# out-of-band (NOT in git) -- template in this dir's README.
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: restore-config
          image: busybox:latest
          command: ['sh', '-c', 'if [ -z "$(find /data -mindepth 1 -not -name lost+found 2>/dev/null)" ]; then if [ -f /data-backup/backup.tar.gz ]; then echo "Restoring from tarball..."; tar xzf /data-backup/backup.tar.gz -C /data; elif [ -n "$(ls -A /data-backup/ 2>/dev/null)" ]; then echo "Restoring from legacy backup..."; cp -r /data-backup/. /data/; else echo "No backup found, skipping."; fi; else echo "Already populated, skipping restore."; fi']
          volumeMounts:
            - name: data
              mountPath: /data
            - name: data-backup
              mountPath: /data-backup
              readOnly: true
        - name: fix-permissions
          image: busybox:latest
          command: ['sh', '-c', 'chown -R 1000:1000 /data || true']
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
      containers:
        - name: keycloak
          # Pinned: SSO is now load-bearing; bump deliberately.
          image: quay.io/keycloak/keycloak:26.6.3
          args:
            - start-dev
          ports:
            - containerPort: 8080
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-creds
                  key: username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-creds
                  key: password
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HOSTNAME
              value: "keycloak.franpolignano.com"
            - name: KC_HTTP_ENABLED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /opt/keycloak/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: keycloak-data
        - name: data-backup
          persistentVolumeClaim:
            claimName: keycloak-data-backup
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
spec:
  type: ClusterIP
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-system
  hostnames:
    - keycloak.franpolignano.com
  rules:
    - backendRefs:
        - name: keycloak
          port: 8080
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-data-backup
  namespace: keycloak
spec:
  schedule: "30 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: keycloak
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: backup
              image: debian:stable-slim
              command: ['sh', '-c', 'echo "Starting keycloak data backup..."; tar czf /data-backup/backup.tar.gz -C /data . 2>/tmp/e; rc=$?; tail -5 /tmp/e; if [ $rc -gt 1 ]; then echo "BACKUP FAILED (tar rc=$rc)"; exit $rc; fi; echo "Backup complete at $(date)"; echo "--> backed up to: $(grep backup /proc/mounts | head -1 | sed "s/ .*//")/backup.tar.gz"']
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: data-backup
                  mountPath: /data-backup
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: keycloak-data
            - name: data-backup
              persistentVolumeClaim:
                claimName: keycloak-data-backup
