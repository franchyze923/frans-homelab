apiVersion: v1
kind: Namespace
metadata:
  name: frigate
---
# Frigate NVR, migrated off the native Docker container on the GPU box.
# Pinned to the GPU node because it needs the Tesla P4 (ONNX/TensorRT object
# detection + NVDEC decode) AND because its data lives on that node's disk,
# mounted via hostPath (zero-migration: same dirs the Docker container used).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  namespace: frigate
  labels:
    app: frigate
spec:
  replicas: 1
  # Recreate: single SQLite writer on shared hostPath -- never run two at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: frigate
  template:
    metadata:
      labels:
        app: frigate
    spec:
      # Must land on the GPU box: GPU detection/decode + hostPath data live here.
      nodeSelector:
        gpu: "true"
      containers:
        - name: frigate
          image: ghcr.io/blakeblackshear/frigate:stable-tensorrt
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "America/New_York"
            # GPU caps for CUDA detection + NVDEC. The device plugin injects
            # NVIDIA_VISIBLE_DEVICES (the allocated P4 slice) automatically.
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,video,utility"
          envFrom:
            # FRIGATE_RTSP_PASSWORD + FRIGATE_REOLINK_PASSWORD (camera password,
            # referenced as {FRIGATE_REOLINK_PASSWORD} in config.yaml). Applied
            # out-of-band via secret.yaml (gitignored) -- NOT managed by ArgoCD.
            - secretRef:
                name: frigate-secrets
          ports:
            - containerPort: 8971
              name: auth-ui
            - containerPort: 5000
              name: ui
            - containerPort: 8554
              name: rtsp
            - containerPort: 8555
              name: webrtc-tcp
            - containerPort: 8555
              name: webrtc-udp
              protocol: UDP
          resources:
            requests:
              memory: "1Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              # 2 cores caused 84% CFS throttling once the second camera,
              # 896x672 detect, and the large face model landed (2026-07-12)
              cpu: "4"
              # One time-sliced slice of the P4 (shared with ollama + Plex).
              nvidia.com/gpu: 1
          volumeMounts:
            - name: config
              mountPath: /config
            # config.yaml comes from the ConfigMap (git-managed); the rest of
            # /config (db, model_cache) stays on the hostPath above.
            - name: frigate-config
              mountPath: /config/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: media
              mountPath: /media/frigate
            # Frigate needs a sizable /dev/shm for decoded camera frames.
            - name: dshm
              mountPath: /dev/shm
            # tmpfs for clip generation cache (best practice, reduces disk wear).
            - name: cache
              mountPath: /tmp/cache
      volumes:
        # config.yaml from git (ConfigMap); db + recordings stay on hostPath.
        - name: frigate-config
          configMap:
            name: frigate-config
        # Existing on-disk data reused in place -- no migration of the ~105GB.
        - name: config
          hostPath:
            path: /home/fran/frigate/config
            type: Directory
        - name: media
          hostPath:
            path: /home/fran/frigate/storage
            type: Directory
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
        - name: cache
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: frigate
  namespace: frigate
  labels:
    app: frigate
spec:
  type: ClusterIP
  selector:
    app: frigate
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: ui
---
# Web UI via the shared gateway (like prometheus/plex). Routes to the plain
# HTTP UI on :5000. NOTE: that port is unauthenticated -- see the cutover
# notes about switching to the authenticated :8971 if this host is exposed.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frigate
  namespace: frigate
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-system
  hostnames:
    - frigate.franpolignano.com
  rules:
    - backendRefs:
        - name: frigate
          port: 5000
