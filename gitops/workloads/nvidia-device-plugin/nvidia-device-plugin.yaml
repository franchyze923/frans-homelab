# Time-slicing config: the single Tesla P4 is advertised as 6 shareable
# replicas so multiple pods (ollama, plex, frigate, immich-ml,
# nvidia-gpu-exporter, and now nvidia-gpu-process-exporter) can each
# request a GPU. Raised 4 -> 5 -> 6 on 2026-07-21 to fit the metrics
# exporters without displacing a real workload -- both only query
# nvidia-smi, negligible VRAM.
# NOTE: time-slicing gives NO memory isolation -- all pods share the P4's
# 8GB VRAM, so keep total usage (ollama ~5GB + plex transcode + frigate
# ~330MB) under that to avoid CUDA OOM.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvidia-device-plugin-config
  namespace: kube-system
data:
  config.yaml: |-
    version: v1
    flags:
      migStrategy: none
    sharing:
      timeSlicing:
        resources:
          - name: nvidia.com/gpu
            replicas: 6
---
# NVIDIA device plugin: advertises nvidia.com/gpu on GPU nodes so pods
# can request GPUs. Based on the upstream static manifest (v0.17.1) with
# a nodeSelector added so it only runs on nodes labeled gpu=true.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      priorityClassName: system-node-critical
      # Only schedule on GPU nodes.
      nodeSelector:
        gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s-device-plugin:v0.17.1
          args:
            - --config-file=/etc/nvidia-device-plugin/config.yaml
          env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: config
              mountPath: /etc/nvidia-device-plugin
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: config
          configMap:
            name: nvidia-device-plugin-config
