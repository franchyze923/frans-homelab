# Template for the real secret.yaml (gitignored, applied out-of-band).
# Copy this file, fill in a real password, and apply it -- do NOT commit
# the copy.
#
#   cp secret.example.yaml secret.yaml
#   # edit DB_PASSWORD in secret.yaml
#   kubectl apply -f secret.yaml
#
# DB_PASSWORD must be alphanumeric only (no symbols) -- Immich's Postgres
# connection string parsing chokes on some special characters.
#
# IMPORTANT: this password only takes effect the FIRST time immich-postgres
# initializes an empty PVC. If the immich-postgres PVC already has data on
# it (e.g. you only lost the Secret, not the PVC), the running database
# still has the OLD password baked in from its original initdb. Applying a
# new secret.yaml with a different password will let immich-postgres start,
# but immich-server will fail to authenticate. Fix by execing into the
# postgres pod and aligning the DB to the new password:
#
#   kubectl exec -it -n immich deploy/immich-postgres -- psql -U postgres -c \
#     "ALTER USER postgres WITH PASSWORD '<same password as DB_PASSWORD below>';"
#
# (This works even without knowing the old password: local socket connections
# from inside the container use trust auth.)
apiVersion: v1
kind: Secret
metadata:
  name: immich-secrets
  namespace: immich
type: Opaque
stringData:
  DB_PASSWORD: CHANGE_ME_alphanumeric_only
  # Admin login used by the library-bootstrap Job to auto-create the
  # "FranPhotos" external library. Optional -- omit them and the Job no-ops.
  IMMICH_ADMIN_EMAIL: you@example.com
  IMMICH_ADMIN_PASSWORD: CHANGE_ME_your_immich_admin_password
