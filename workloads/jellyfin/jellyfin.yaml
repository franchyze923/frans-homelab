apiVersion: v1
kind: Namespace
metadata:
  name: jellyfin
---
# Config on Ceph RBD for reliability (no stale NFS handles)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 10Gi
---
# NFS volume for config backups (survives cluster rebuilds)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-config-backup-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranArchives/k8s-pvs/jellyfin
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-backup
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: jellyfin-config-backup-pv
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-pv
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranMedia
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-media
  namespace: jellyfin
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  volumeName: jellyfin-media-pv
  resources:
    requests:
      storage: 10Ti
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      initContainers:
        - name: restore-config
          image: busybox:latest
          command: ['sh', '-c', 'if [ -z "$(find /config -mindepth 1 -not -name lost+found 2>/dev/null)" ] && [ -n "$(ls -A /config-backup/ 2>/dev/null)" ]; then echo "Restoring from NFS backup..."; cp -r /config-backup/. /config/; echo "Restore complete."; else echo "Config exists or no backup, skipping."; fi']
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-backup
              mountPath: /config-backup
              readOnly: true
      containers:
        - name: jellyfin
          image: lscr.io/linuxserver/jellyfin:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/New_York"
          ports:
            - containerPort: 8096
              name: http
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: config-backup
          persistentVolumeClaim:
            claimName: jellyfin-config-backup
        - name: media
          persistentVolumeClaim:
            claimName: jellyfin-media
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  type: ClusterIP
  selector:
    app: jellyfin
  ports:
    - port: 8096
      targetPort: 8096
      protocol: TCP
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin-ingress
  namespace: jellyfin
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
  - host: jellyfin.franpolignano.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jellyfin
            port:
              number: 8096
  tls:
  - hosts:
    - jellyfin.franpolignano.com
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: jellyfin-config-backup
  namespace: jellyfin
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: jellyfin
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: backup
              image: busybox:latest
              command: ['sh', '-c', 'echo "Starting jellyfin config backup..."; cp -r /config/. /config-backup/ 2>&1 | tail -5; echo "Backup complete at $(date)"']
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: config-backup
                  mountPath: /config-backup
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: jellyfin-config
            - name: config-backup
              persistentVolumeClaim:
                claimName: jellyfin-config-backup
