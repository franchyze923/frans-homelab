apiVersion: v1
kind: Namespace
metadata:
  name: sabnzbd
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sabnzbd-downloads-pv
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranMedia/Completed_dls
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sabnzbd-downloads
  namespace: sabnzbd
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: sabnzbd-downloads-pv
  resources:
    requests:
      storage: 10Ti
---
# Config on Ceph RBD for reliability (no stale NFS handles)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sabnzbd-config
  namespace: sabnzbd
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 2Gi
---
# NFS volume for config backups (survives cluster rebuilds)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sabnzbd-config-backup-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranArchives/k8s-pvs/sabnzbd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sabnzbd-config-backup
  namespace: sabnzbd
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: sabnzbd-config-backup-pv
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
  namespace: sabnzbd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sabnzbd
  template:
    metadata:
      labels:
        app: sabnzbd
    spec:
      initContainers:
        - name: restore-config
          image: busybox:latest
          command: ['sh', '-c', 'if [ -z "$(find /config -mindepth 1 -not -name lost+found 2>/dev/null)" ] && [ -n "$(ls -A /config-backup/ 2>/dev/null)" ]; then echo "Restoring from NFS backup..."; cp -r /config-backup/. /config/; echo "Restore complete."; else echo "Config exists or no backup, skipping."; fi']
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-backup
              mountPath: /config-backup
              readOnly: true
      containers:
        - name: sabnzbd
          image: lscr.io/linuxserver/sabnzbd:latest
          ports:
            - containerPort: 8080
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/New_York"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sabnzbd-config
        - name: config-backup
          persistentVolumeClaim:
            claimName: sabnzbd-config-backup
        - name: downloads
          persistentVolumeClaim:
            claimName: sabnzbd-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: sabnzbd
  namespace: sabnzbd
spec:
  type: ClusterIP
  selector:
    app: sabnzbd
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sabnzbd-ingress
  namespace: sabnzbd
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
  - host: sabnzbd.franpolignano.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sabnzbd
            port:
              number: 8080
  tls:
  - hosts:
    - sabnzbd.franpolignano.com
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sabnzbd-config-backup
  namespace: sabnzbd
spec:
  schedule: "10 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: sabnzbd
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: backup
              image: busybox:latest
              command: ['sh', '-c', 'echo "Starting sabnzbd config backup..."; cp -r /config/. /config-backup/ 2>&1 | tail -5; echo "Backup complete at $(date)"']
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: config-backup
                  mountPath: /config-backup
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: sabnzbd-config
            - name: config-backup
              persistentVolumeClaim:
                claimName: sabnzbd-config-backup
