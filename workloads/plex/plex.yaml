apiVersion: v1
kind: Namespace
metadata:
  name: plex
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-config-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranArchives/k8s-pvs/plex
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config
  namespace: plex
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: plex-config-pv
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-media-pv
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranMedia
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-media
  namespace: plex
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  volumeName: plex-media-pv
  resources:
    requests:
      storage: 10Ti
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-homemedia-pv
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranHomeMedia
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-homemedia
  namespace: plex
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  volumeName: plex-homemedia-pv
  resources:
    requests:
      storage: 10Ti
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-familymedia-pv
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FamilyHomeMedia
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-familymedia
  namespace: plex
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  volumeName: plex-familymedia-pv
  resources:
    requests:
      storage: 10Ti
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: plex
  labels:
    app: plex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      initContainers:
        - name: wait-for-media
          image: busybox:latest
          command: ['sh', '-c', 'until ls /media > /dev/null 2>&1; do echo "Waiting for media NFS mount..."; sleep 2; done; echo "Media mount ready."']
          volumeMounts:
            - name: media
              mountPath: /media
              readOnly: true
      containers:
        - name: plex
          image: lscr.io/linuxserver/plex:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/New_York"
            - name: VERSION
              value: "docker"
            - name: ADVERTISE_IP
              value: "http://192.168.40.201:32400,https://plex.franpolignano.com:443,http://173.62.165.225:32402,http://franchyze923.duckdns.org:32402"
          ports:
            - containerPort: 32400
              name: http
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "12Gi"
              cpu: "6000m"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
              readOnly: true
            - name: homemedia
              mountPath: /homemedia
              readOnly: true
            - name: familymedia
              mountPath: /familymedia
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: plex-config
        - name: media
          persistentVolumeClaim:
            claimName: plex-media
        - name: homemedia
          persistentVolumeClaim:
            claimName: plex-homemedia
        - name: familymedia
          persistentVolumeClaim:
            claimName: plex-familymedia
---
apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: plex
  labels:
    app: plex
spec:
  type: ClusterIP
  selector:
    app: plex
  ports:
    - port: 32400
      targetPort: 32400
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: plex-lb
  namespace: plex
  labels:
    app: plex
  annotations:
    lbipam.cilium.io/sharing-key: "platform"
    lbipam.cilium.io/sharing-cross-namespace: "*"
spec:
  type: LoadBalancer
  selector:
    app: plex
  ports:
    - port: 32400
      targetPort: 32400
      protocol: TCP
      name: plex
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plex-ingress
  namespace: plex
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
  - host: plex.franpolignano.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: plex
            port:
              number: 32400
  tls:
  - hosts:
    - plex.franpolignano.com
