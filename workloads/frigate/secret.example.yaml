# TEMPLATE ONLY -- committed for documentation. Do NOT put real passwords here.
#
# To use:
#   cp secret.example.yaml secret.yaml      # secret.yaml is gitignored
#   # edit secret.yaml with the real values
#   kubectl apply -f secret.yaml
#
# This Secret is applied OUT-OF-BAND (not via ArgoCD), so the passwords never
# land in git. ArgoCD won't prune it because it isn't tracked in the repo.
apiVersion: v1
kind: Secret
metadata:
  name: frigate-secrets
  namespace: frigate
type: Opaque
stringData:
  # Internal go2rtc/restream RTSP server password.
  FRIGATE_RTSP_PASSWORD: "REPLACE_ME"
  # Reolink camera password -- referenced in config.yaml as {FRIGATE_REOLINK_PASSWORD}.
  FRIGATE_REOLINK_PASSWORD: "REPLACE_ME"
