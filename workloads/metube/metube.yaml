apiVersion: v1
kind: Namespace
metadata:
  name: metube
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: metube-downloads-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranMedia/metube_youtube_downloader
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metube-downloads
  namespace: metube
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: metube-downloads-pv
  resources:
    requests:
      storage: 1Ti
---
# Config on Ceph RBD for reliability (no stale NFS handles)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metube-config
  namespace: metube
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 1Gi
---
# NFS volume for config backups (survives cluster rebuilds)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: metube-config-backup-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - hard
    - noresvport
    - timeo=600
    - retrans=5
  nfs:
    server: 192.168.40.116
    path: /mnt/user/FranData/FranArchives/k8s-pvs/metube
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metube-config-backup
  namespace: metube
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: metube-config-backup-pv
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metube
  namespace: metube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metube
  template:
    metadata:
      labels:
        app: metube
    spec:
      initContainers:
        - name: restore-config
          image: busybox:latest
          command: ['sh', '-c', 'if [ -z "$(find /config -mindepth 1 -not -name lost+found 2>/dev/null)" ]; then if [ -f /config-backup/backup.tar.gz ]; then echo "Restoring from tarball..."; tar xzf /config-backup/backup.tar.gz -C /config; elif [ -n "$(ls -A /config-backup/ 2>/dev/null)" ]; then echo "Restoring from legacy backup..."; cp -r /config-backup/. /config/; else echo "No backup found, skipping."; fi; else echo "Already populated, skipping restore."; fi']
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-backup
              mountPath: /config-backup
              readOnly: true
      containers:
        - name: metube
          image: ghcr.io/alexta69/metube:latest
          ports:
            - containerPort: 8081
          env:
            - name: DOWNLOAD_DIR
              value: /media/videos
            - name: AUDIO_DOWNLOAD_DIR
              value: /media/music
            - name: STATE_DIR
              value: /config
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /media
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: metube-config
        - name: config-backup
          persistentVolumeClaim:
            claimName: metube-config-backup
        - name: downloads
          persistentVolumeClaim:
            claimName: metube-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: metube
  namespace: metube
spec:
  type: ClusterIP
  selector:
    app: metube
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: metube
  namespace: metube
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-system
  hostnames:
    - metube.franpolignano.com
  rules:
    - backendRefs:
        - name: metube
          port: 8081
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: metube-config-backup
  namespace: metube
spec:
  schedule: "15 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: metube
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: backup
              image: debian:stable-slim
              command: ['sh', '-c', 'echo "Starting metube config backup..."; tar czf /config-backup/backup.tar.gz -C /config . 2>/tmp/e; rc=$?; tail -5 /tmp/e; if [ $rc -gt 1 ]; then echo "BACKUP FAILED (tar rc=$rc)"; exit $rc; fi; echo "Backup complete at $(date)"; echo "--> backed up to: $(grep backup /proc/mounts | head -1 | sed "s/ .*//")/backup.tar.gz"']
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: config-backup
                  mountPath: /config-backup
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: metube-config
            - name: config-backup
              persistentVolumeClaim:
                claimName: metube-config-backup
